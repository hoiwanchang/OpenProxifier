name: Release Latest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Pre-release tag to promote to latest release (e.g., dev-20240101-120000-abc1234)"
        required: true
        type: string
      release_name:
        description: "Release display name (optional, defaults to tag)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and promote release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          NAME="${{ inputs.release_name }}"

          # Default release name to tag if not provided
          if [ -z "$NAME" ]; then
            NAME="Release $TAG"
          fi

          echo "Promoting tag: $TAG"
          echo "Release name: $NAME"

          # Verify the release exists
          if ! gh release view "$TAG"; then
            echo "::error::Release with tag '$TAG' not found."
            exit 1
          fi

          # Promote: remove prerelease flag and mark as latest
          gh release edit "$TAG" \
            --title "$NAME" \
            --prerelease=false \
            --latest

          echo "✅ Successfully promoted '$TAG' to latest release."
